<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mind Map: Modelos Cerrados vs Open Source</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #0a0a1a;
            color: #e8e8f0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        .header {
            margin-bottom: 30px;
        }

        .back-link {
            display: inline-block;
            margin-bottom: 15px;
            color: #00f0ff;
            text-decoration: none;
            font-size: 14px;
            transition: color 0.3s ease;
        }

        .back-link:hover {
            color: #ff00e5;
        }

        h1 {
            font-size: 32px;
            margin-bottom: 10px;
            color: #39ff14;
        }

        .subtitle {
            font-size: 16px;
            color: #ffe600;
            margin-bottom: 20px;
        }

        .controls {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        .btn {
            padding: 10px 15px;
            background: #00f0ff;
            border: 1px solid #00f0ff;
            color: #e8e8f0;
            border-radius: 4px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.3s ease;
        }

        .btn:hover {
            background: #2e7d32;
            color: #00f0ff;
            box-shadow: 0 0 10px rgba(0, 240, 255, 0.5);
        }

        .mindmap-container {
            background: #0f0f25;
            border: 1px solid #00f0ff;
            border-radius: 8px;
            padding: 30px;
            overflow-x: auto;
        }

        .tree {
            display: inline-block;
            min-width: 100%;
        }

        .node {
            margin-bottom: 10px;
            font-size: 14px;
        }

        .node-wrapper {
            display: flex;
            align-items: flex-start;
            gap: 8px;
        }

        .toggle-btn {
            background: none;
            border: none;
            color: #00f0ff;
            cursor: pointer;
            font-size: 18px;
            padding: 0;
            width: 20px;
            height: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
            flex-shrink: 0;
        }

        .toggle-btn:hover {
            color: #ff00e5;
            transform: scale(1.2);
        }

        .toggle-btn.hidden {
            visibility: hidden;
        }

        .node-content {
            flex-grow: 1;
            padding: 8px 12px;
            border-radius: 4px;
            background: rgba(0, 240, 255, 0.1);
            border-left: 3px solid #00f0ff;
            cursor: pointer;
            transition: all 0.3s ease;
            word-break: break-word;
        }

        .node-content:hover {
            background: rgba(0, 240, 255, 0.2);
            border-left-color: #ff00e5;
            box-shadow: 0 0 10px rgba(0, 240, 255, 0.3);
        }

        /* Color por nivel */
        .node.level-0 .node-content {
            background: rgba(57, 255, 20, 0.15);
            border-left-color: #39ff14;
            font-weight: bold;
            font-size: 16px;
        }

        .node.level-1 .node-content {
            background: rgba(255, 0, 229, 0.1);
            border-left-color: #ff00e5;
            font-weight: bold;
            font-size: 15px;
        }

        .node.level-2 .node-content {
            background: rgba(255, 230, 0, 0.1);
            border-left-color: #ffe600;
            font-weight: 600;
            font-size: 14px;
        }

        .node.level-3 .node-content {
            background: rgba(255, 107, 0, 0.1);
            border-left-color: #ff6b00;
            font-size: 13px;
        }

        .node.level-4 .node-content {
            background: rgba(0, 240, 255, 0.08);
            border-left-color: #00f0ff;
            font-size: 12px;
            color: #d0d0e0;
        }

        .children {
            margin-left: 25px;
            margin-top: 8px;
            border-left: 1px solid rgba(0, 240, 255, 0.2);
            padding-left: 12px;
            max-height: 10000px;
            overflow: hidden;
            transition: all 0.3s ease;
        }

        .children.collapsed {
            max-height: 0;
            opacity: 0;
            margin-top: 0;
        }

        @media (max-width: 768px) {
            .mindmap-container {
                padding: 15px;
            }

            .children {
                margin-left: 15px;
                padding-left: 8px;
            }

            h1 {
                font-size: 24px;
            }

            .controls {
                gap: 5px;
            }

            .btn {
                padding: 8px 12px;
                font-size: 12px;
            }
        }

        .footer {
            text-align: center;
            margin-top: 20px;
            font-size: 12px;
            color: #808090;
        }

        </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <a href="clase-04.html" class="back-link">← Volver a Clase 04</a>
            <h1>Mind Map: Modelos Cerrados vs Open Source</h1>
            <p class="subtitle">Guía visual para la clase sobre modelos de IA y Ollama</p>
        </div>

        <div class="controls">
            <button class="btn" id="expandAllBtn">Expandir todo</button>
            <button class="btn" id="collapseAllBtn">Colapsar todo</button>
</div>
<div class="mindmap-container">
            <div class="tree" id="mindmapTree"></div>
        </div>

        <div class="footer">
            Interactivo: haz clic en los nodos para expandir/contraer. Usa los botones para controlar la vista.
        </div>
    </div>

    <script>


        const mindmapData = {
            title: "Ecosistema de Modelos de IA",
            children: [
                {
                    title: "Modelos Cerrados (APIs)",
                    children: [
                        {
                            title: "GPT-4o (OpenAI)",
                            children: [
                                { title: "Multimodal: texto, imagen, audio, vídeo" },
                                { title: "128K tokens de contexto" },
                                { title: "~$2.50/1M tokens input" },
                                { title: "Ventaja: El más popular, mayor ecosistema" },
                                { title: "Limitación: Datos en servidores de OpenAI" }
                            ]
                        },
                        {
                            title: "Claude 3.5 Sonnet (Anthropic)",
                            children: [
                                { title: "Excelente en código y razonamiento" },
                                { title: "200K tokens de contexto (el mayor de los cerrados)" },
                                { title: "~$3/1M tokens input" },
                                { title: "Ventaja: Muy bueno siguiendo instrucciones complejas" }
                            ]
                        },
                        {
                            title: "Gemini 1.5 Pro (Google)",
                            children: [
                                { title: "Ventana de contexto ENORME: 1M tokens" },
                                { title: "~$1.25/1M tokens input (más barato)" },
                                { title: "Integración con Google Workspace" },
                                { title: "Limitación: Menos consistente que GPT-4o/Claude" }
                            ]
                        },
                        {
                            title: "Ventajas de APIs cerradas",
                            children: [
                                { title: "No necesitas GPU → funciona desde cualquier PC" },
                                { title: "Modelos más potentes disponibles hoy" },
                                { title: "Setup en minutos (solo API key)" },
                                { title: "Ideal para prototipos rápidos" }
                            ]
                        },
                        {
                            title: "Desventajas",
                            children: [
                                { title: "Tus datos van a servidores externos" },
                                { title: "Coste variable (puede escalar)" },
                                { title: "Dependencia del proveedor (vendor lock-in)" },
                                { title: "El modelo puede cambiar sin aviso" }
                            ]
                        }
                    ]
                },
                {
                    title: "Modelos Open Source",
                    children: [
                        {
                            title: "Llama 3.1 (Meta)",
                            children: [
                                { title: "Versiones: 8B, 70B, 405B parámetros" },
                                { title: "Licencia: Permisiva (uso comercial OK)" },
                                { title: "El más popular en open source" }
                            ]
                        },
                        {
                            title: "Mistral (Mistral AI)",
                            children: [
                                { title: "Versiones: 7B, Mixtral 8x7B" },
                                { title: "Excelente relación tamaño/rendimiento" }
                            ]
                        },
                        {
                            title: "Phi-3 (Microsoft)",
                            children: [
                                { title: "Solo 3.8B parámetros" },
                                { title: "Sorprendentemente capaz para su tamaño → ideal para portátiles" }
                            ]
                        },
                        {
                            title: "Gemma 2 (Google)",
                            children: [
                                { title: "Versiones: 2B, 9B, 27B" },
                                { title: "Buenos para dispositivos con poca RAM" }
                            ]
                        },
                        {
                            title: "Ventajas de open source",
                            children: [
                                { title: "Tus datos NUNCA salen de tu máquina" },
                                { title: "Coste predecible (solo hardware)" },
                                { title: "Control total → puedes fine-tunear" },
                                { title: "Sin dependencia de proveedor" }
                            ]
                        },
                        {
                            title: "Desventajas",
                            children: [
                                { title: "Necesitas GPU/RAM para correrlos" },
                                { title: "Generalmente menos capaces que los cerrados top" },
                                { title: "Más setup y mantenimiento" }
                            ]
                        }
                    ]
                },
                {
                    title: "Ollama: Tu Puerta de Entrada",
                    children: [
                        { title: "¿Qué es? Herramienta para correr modelos localmente con un comando" },
                        {
                            title: "Instalación",
                            children: [
                                { title: "macOS/Linux: curl -fsSL https://ollama.com/install.sh | sh" },
                                { title: "Windows: descargar desde ollama.com/download" }
                            ]
                        },
                        {
                            title: "Comandos básicos",
                            children: [
                                { title: "ollama run llama3.2 → Descarga y ejecuta" },
                                { title: "ollama list → Ver modelos instalados" },
                                { title: "ollama ps → Ver modelos en ejecución" },
                                { title: "ollama rm nombre → Eliminar un modelo" }
                            ]
                        },
                        {
                            title: "API Local (localhost:11434)",
                            children: [
                                { title: "Misma estructura que API de OpenAI" },
                                { title: "curl http://localhost:11434/api/generate" },
                                { title: "Compatible con Python (requests) y JavaScript (fetch)" }
                            ]
                        },
                        {
                            title: "Requisitos mínimos",
                            children: [
                                { title: "8GB RAM → modelos 7B (phi3, llama3.2)" },
                                { title: "16GB RAM → modelos 13B" },
                                { title: "GPU NVIDIA/AMD → acelera mucho la inferencia" }
                            ]
                        }
                    ]
                },
                {
                    title: "Hugging Face: El GitHub de la IA",
                    children: [
                        { title: "Repositorio con miles de modelos, datasets y demos" },
                        { title: "Buscar modelos: huggingface.co/models" },
                        { title: "Librería transformers (Python) para usar modelos" },
                        { title: "Spaces: demos interactivas gratuitas" }
                    ]
                },
                {
                    title: "¿Cuándo usar cada uno? (Guía rápida)",
                    children: [
                        { title: "Prototipo rápido → API cerrada (GPT-4o, Claude)" },
                        { title: "Datos sensibles → Open source + Ollama" },
                        { title: "Producción a escala → Depende del presupuesto y requisitos" },
                        { title: "Aprender → ¡Prueba TODOS! Compara resultados" }
                    ]
                }
            ]
        };

        let nextNodeId = 0;
        const nodeMap = new Map();

        function createNodeElement(data, level = 0) {
            const nodeId = nextNodeId++;
            const hasChildren = data.children && data.children.length > 0;

            const nodeDiv = document.createElement('div');
            nodeDiv.className = `node level-${Math.min(level, 4)}`;
            nodeDiv.dataset.nodeId = nodeId;

            const wrapperDiv = document.createElement('div');
            wrapperDiv.className = 'node-wrapper';

            const toggleBtn = document.createElement('button');
            toggleBtn.className = hasChildren ? 'toggle-btn' : 'toggle-btn hidden';
            toggleBtn.innerHTML = '▼';
            toggleBtn.dataset.expanded = 'true';

            if (level === 0) {
                toggleBtn.dataset.expanded = 'true';
            } else {
                toggleBtn.dataset.expanded = 'true';
            }

            const contentDiv = document.createElement('div');
            contentDiv.className = 'node-content';
            contentDiv.textContent = data.title;

            wrapperDiv.appendChild(toggleBtn);
            wrapperDiv.appendChild(contentDiv);
            nodeDiv.appendChild(wrapperDiv);

            if (hasChildren) {
                const childrenDiv = document.createElement('div');
                childrenDiv.className = 'children';

                if (level === 0) {
                    childrenDiv.classList.remove('collapsed');
                } else {
                    childrenDiv.classList.add('collapsed');
                    toggleBtn.dataset.expanded = 'false';
                    toggleBtn.innerHTML = '▶';
                }

                data.children.forEach(child => {
                    childrenDiv.appendChild(createNodeElement(child, level + 1));
                });

                nodeDiv.appendChild(childrenDiv);

                toggleBtn.addEventListener('click', (e) => {
                    e.stopPropagation();
                    const isExpanded = toggleBtn.dataset.expanded === 'true';
                    if (isExpanded) {
                        childrenDiv.classList.add('collapsed');
                        toggleBtn.innerHTML = '▶';
                        toggleBtn.dataset.expanded = 'false';
                    } else {
                        childrenDiv.classList.remove('collapsed');
                        toggleBtn.innerHTML = '▼';
                        toggleBtn.dataset.expanded = 'true';
                    }
                });
            }

            contentDiv.addEventListener('click', () => {
                if (hasChildren) {
                    toggleBtn.click();
                }
            });

            nodeMap.set(nodeId, { toggleBtn, childrenDiv: hasChildren ? nodeDiv.querySelector('.children') : null });

            return nodeDiv;
        }

        function expandAll() {
            nodeMap.forEach(({ toggleBtn, childrenDiv }) => {
                if (childrenDiv && toggleBtn) {
                    childrenDiv.classList.remove('collapsed');
                    toggleBtn.innerHTML = '▼';
                    toggleBtn.dataset.expanded = 'true';
                }
            });
        }

        function collapseAll() {
            nodeMap.forEach(({ toggleBtn, childrenDiv }) => {
                if (childrenDiv && toggleBtn) {
                    childrenDiv.classList.add('collapsed');
                    toggleBtn.innerHTML = '▶';
                    toggleBtn.dataset.expanded = 'false';
                }
            });
        }

        document.addEventListener('DOMContentLoaded', () => {
            const mindmapTree = document.getElementById('mindmapTree');
            const rootElement = createNodeElement(mindmapData, 0);
            mindmapTree.appendChild(rootElement);

            document.getElementById('expandAllBtn').addEventListener('click', expandAll);
            document.getElementById('collapseAllBtn').addEventListener('click', collapseAll);
        });
    </script>
</body>
</html>
