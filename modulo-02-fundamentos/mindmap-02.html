<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mind Map: Cómo Funcionan los LLMs</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #0a0a1a 0%, #1a1a2e 100%);
            color: #e8e8f0;
            min-height: 100vh;
            padding: 2rem;
            overflow-x: auto;
        }

        .header {
            max-width: 1400px;
            margin: 0 auto 2rem;
        }

        .back-link {
            display: inline-block;
            color: #00f0ff;
            text-decoration: none;
            font-size: 1rem;
            margin-bottom: 1rem;
            transition: all 0.3s ease;
            font-weight: 600;
        }

        .back-link:hover {
            color: #ff00e5;
            transform: translateX(-4px);
        }

        h1 {
            color: #00f0ff;
            font-size: 2.2rem;
            margin-bottom: 0.3rem;
            text-shadow: 0 0 20px rgba(0, 240, 255, 0.3);
        }

        h2 {
            color: #ff00e5;
            font-size: 1.1rem;
            font-weight: 300;
            margin-bottom: 1.5rem;
            opacity: 0.9;
        }

        .controls {
            display: flex;
            gap: 1rem;
            margin-bottom: 2rem;
            flex-wrap: wrap;
        }

        button {
            padding: 0.7rem 1.4rem;
            background: linear-gradient(135deg, #00f0ff 0%, #39ff14 100%);
            border: none;
            color: #0a0a1a;
            font-weight: 600;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.95rem;
            transition: all 0.3s ease;
            box-shadow: 0 0 15px rgba(0, 240, 255, 0.2);
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 25px rgba(0, 240, 255, 0.4);
        }

        button:active {
            transform: translateY(0);
        }

        .mindmap-container {
            max-width: 1400px;
            margin: 0 auto;
            background: rgba(26, 26, 46, 0.4);
            border: 1px solid rgba(0, 240, 255, 0.2);
            border-radius: 12px;
            padding: 2rem;
            backdrop-filter: blur(10px);
        }

        .node {
            margin-left: 2rem;
            margin-bottom: 1rem;
        }

        .node-root {
            margin-left: 0;
        }

        .node-toggle {
            background: none;
            border: none;
            color: #00f0ff;
            font-size: 1.2rem;
            cursor: pointer;
            padding: 0 0.5rem;
            margin-right: 0.5rem;
            transition: all 0.2s ease;
            width: 20px;
            text-align: center;
            display: inline-block;
        }

        .node-toggle:hover {
            color: #ff00e5;
            transform: scale(1.2);
        }

        .node-toggle.collapsed::before {
            content: '▶';
        }

        .node-toggle.expanded::before {
            content: '▼';
        }

        .node-header {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            cursor: pointer;
            padding: 0.5rem 1rem;
            border-radius: 6px;
            transition: all 0.2s ease;
            flex-wrap: wrap;
        }

        .node-header:hover {
            background: rgba(0, 240, 255, 0.1);
        }

        .node-title {
            font-weight: 600;
            font-size: 1rem;
        }

        /* Depth-based colors */
        .depth-0 .node-title {
            color: #00f0ff;
            font-size: 1.2rem;
            text-shadow: 0 0 10px rgba(0, 240, 255, 0.3);
        }

        .depth-1 .node-title {
            color: #ff00e5;
            font-size: 1.05rem;
        }

        .depth-2 .node-title {
            color: #39ff14;
            font-size: 0.95rem;
        }

        .depth-3 .node-title {
            color: #ffe600;
            font-size: 0.9rem;
        }

        .depth-4 .node-title {
            color: #ff6b00;
            font-size: 0.85rem;
        }

        .node-children {
            max-height: 10000px;
            overflow: hidden;
            transition: max-height 0.3s ease, opacity 0.3s ease;
            opacity: 1;
        }

        .node-children.collapsed {
            max-height: 0;
            opacity: 0;
            overflow: hidden;
        }

        .node-description {
            color: #a0a0b0;
            font-size: 0.9rem;
            margin: 0.5rem 0 0 2.5rem;
            font-style: italic;
            line-height: 1.4;
            max-width: 600px;
            padding: 0.5rem 1rem;
            background: rgba(57, 255, 20, 0.05);
            border-left: 3px solid rgba(57, 255, 20, 0.3);
            border-radius: 4px;
        }

        .node-title.has-children {
            cursor: pointer;
        }

        .leaf-node {
            color: #d0d0e0;
            font-size: 0.95rem;
            padding: 0.5rem 1rem;
            margin-left: 2.5rem;
            margin-top: 0.3rem;
        }

        .depth-1 .leaf-node {
            color: #c0c0d0;
        }

        .depth-2 .leaf-node {
            color: #b0b0c0;
        }

        /* Responsive */
        @media (max-width: 768px) {
            body {
                padding: 1rem;
            }

            .mindmap-container {
                padding: 1rem;
            }

            h1 {
                font-size: 1.6rem;
            }

            h2 {
                font-size: 0.95rem;
            }

            .node {
                margin-left: 1.2rem;
            }

            .controls {
                flex-direction: column;
            }

            button {
                width: 100%;
            }

            .node-description {
                margin-left: 1.5rem;
            }
        }

        .link-reference {
            color: #39ff14;
            text-decoration: none;
            border-bottom: 1px dotted #39ff14;
            transition: all 0.2s ease;
        }

        .link-reference:hover {
            color: #ff00e5;
            border-bottom-color: #ff00e5;
        }

        </style>
</head>
<body>

        function renderNode(node, depth = 0) {
            const nodeEl = document.createElement('div');
            nodeEl.className = `node depth-${depth}`;
            if (depth === 0) nodeEl.classList.add('node-root');

            const hasChildren = node.children && node.children.length > 0;

            // Header row
            const headerEl = document.createElement('div');
            headerEl.style.display = 'flex';
            headerEl.style.alignItems = 'center';
            headerEl.style.gap = '0.5rem';

            if (hasChildren) {
                const toggleBtn = document.createElement('button');
                toggleBtn.className = `node-toggle ${node.expanded ? 'expanded' : 'collapsed'}`;
                toggleBtn.onclick = (e) => {
                    e.stopPropagation();
                    node.expanded = !node.expanded;
                    const childrenDiv = nodeEl.querySelector('.node-children');
                    if (node.expanded) {
                        childrenDiv.classList.remove('collapsed');
                        toggleBtn.classList.remove('collapsed');
                        toggleBtn.classList.add('expanded');
                    } else {
                        childrenDiv.classList.add('collapsed');
                        toggleBtn.classList.add('collapsed');
                        toggleBtn.classList.remove('expanded');
                    }
                };
                headerEl.appendChild(toggleBtn);
            }

            const titleSpan = document.createElement('span');
            titleSpan.className = 'node-title' + (hasChildren ? ' has-children' : '');
            titleSpan.textContent = node.title;
            headerEl.appendChild(titleSpan);

            nodeEl.appendChild(headerEl);

            // Children
            if (hasChildren) {
                const childrenDiv = document.createElement('div');
                childrenDiv.className = `node-children ${node.expanded ? '' : 'collapsed'}`;
                for (const child of node.children) {
                    childrenDiv.appendChild(renderNode(child, depth + 1));
                }
                nodeEl.appendChild(childrenDiv);
            }

            return nodeEl;
        }

        function renderMindmap() {
            const container = document.getElementById('mindmap');
            container.innerHTML = '';
            container.appendChild(renderNode(mindmapData, 0));
        }

        function expandAll() {
            function expand(node) {
                node.expanded = true;
                if (node.children) {
                    for (const child of node.children) {
                        expand(child);
                    }
                }
            }
            expand(mindmapData);
            renderMindmap();
        }

        function collapseAll() {
            function collapse(node) {
                if (node.depth > 0) {
                    node.expanded = false;
                }
                if (node.children) {
                    for (const child of node.children) {
                        collapse(child);
                    }
                }
            }
            collapse(mindmapData);
            renderMindmap();
        }

        // Initial render
        renderMindmap();

</body>
</html>
