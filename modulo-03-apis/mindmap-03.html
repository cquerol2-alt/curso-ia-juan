<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mind Map: Chatbot con Memoria de Conversación</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: linear-gradient(135deg, #0a0a1a 0%, #0f0f2e 100%); color: #e8e8f0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; min-height: 100vh; padding: 20px; line-height: 1.6; }
        .container { max-width: 1400px; margin: 0 auto; }
        header { margin-bottom: 30px; text-align: center; }
        .back-link { display: inline-block; margin-bottom: 20px; padding: 10px 20px; background: rgba(0, 240, 255, 0.1); border: 2px solid #00f0ff; color: #00f0ff; text-decoration: none; border-radius: 6px; font-weight: 600; transition: all 0.3s ease; }
        .back-link:hover { background: rgba(0, 240, 255, 0.2); transform: translateX(-4px); }
        h1 { font-size: 2.5em; margin: 20px 0 10px 0; background: linear-gradient(45deg, #00f0ff, #ff00e5); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
        .subtitle { font-size: 1.1em; color: #a0a0b8; margin-bottom: 30px; font-style: italic; }
        .controls { margin-bottom: 25px; display: flex; gap: 15px; justify-content: center; flex-wrap: wrap; }
        .btn { padding: 12px 24px; border: 2px solid; border-radius: 6px; background: transparent; color: white; font-weight: 600; cursor: pointer; transition: all 0.3s ease; font-size: 1em; }
        .btn-expand { border-color: #39ff14; color: #39ff14; }
        .btn-expand:hover { background: rgba(57, 255, 20, 0.15); transform: scale(1.05); }
        .btn-collapse { border-color: #ff00e5; color: #ff00e5; }
        .btn-collapse:hover { background: rgba(255, 0, 229, 0.15); transform: scale(1.05); }
        .mindmap { background: rgba(20, 20, 40, 0.6); border: 2px solid rgba(0, 240, 255, 0.2); border-radius: 12px; padding: 30px; overflow-x: auto; }
        .tree-view { display: inline-block; min-width: 100%; font-size: 0.95em; }
        .node { margin: 10px 0; padding: 15px 20px; background: rgba(30, 30, 50, 0.8); border-left: 4px solid; border-radius: 6px; cursor: pointer; transition: all 0.3s ease; position: relative; display: flex; align-items: center; gap: 12px; }
        .node:hover { background: rgba(40, 40, 60, 0.9); transform: translateX(8px); }
        .node[data-level="0"] { border-left-color: #00f0ff; background: rgba(0, 240, 255, 0.08); font-size: 1.2em; font-weight: 700; padding: 20px 25px; margin: 20px 0; }
        .node[data-level="0"]:hover { background: rgba(0, 240, 255, 0.15); box-shadow: 0 0 20px rgba(0, 240, 255, 0.3); }
        .node[data-level="1"] { border-left-color: #ff00e5; margin-left: 30px; font-weight: 600; }
        .node[data-level="1"]:hover { box-shadow: 0 0 15px rgba(255, 0, 229, 0.2); }
        .node[data-level="2"] { border-left-color: #39ff14; margin-left: 60px; font-weight: 500; }
        .node[data-level="2"]:hover { box-shadow: 0 0 15px rgba(57, 255, 20, 0.2); }
        .node[data-level="3"], .node[data-level="4"], .node[data-level="5"] { border-left-color: #ffd700; margin-left: 90px; font-weight: 400; font-size: 0.95em; }
        .node[data-level="3"]:hover, .node[data-level="4"]:hover, .node[data-level="5"]:hover { box-shadow: 0 0 15px rgba(255, 215, 0, 0.2); }
        .toggle { display: inline-block; width: 24px; height: 24px; background: rgba(0, 240, 255, 0.2); border: 2px solid #00f0ff; border-radius: 4px; text-align: center; line-height: 20px; font-weight: bold; color: #00f0ff; flex-shrink: 0; transition: all 0.2s ease; }
        .toggle:hover { background: rgba(0, 240, 255, 0.4); transform: scale(1.1); }
        .toggle.collapsed::before { content: "+"; }
        .toggle.expanded::before { content: "−"; }
        .toggle.empty { visibility: hidden; }
        .node-content { flex: 1; display: flex; flex-direction: column; gap: 4px; }
        .node-title { font-weight: 600; color: #e8e8f0; }
        .node-description { font-size: 0.85em; color: #a0a0b8; font-weight: 400; max-width: 800px; }
        .hidden { display: none; }
        .children { max-height: 10000px; overflow: hidden; transition: max-height 0.4s ease; }
        .children.collapsed { max-height: 0; overflow: hidden; }
        @media (max-width: 768px) {
            h1 { font-size: 1.8em; }
            .node { padding: 12px 15px; font-size: 0.85em; margin: 8px 0; gap: 10px; }
            .node[data-level="0"] { padding: 16px 20px; font-size: 1em; }
            .node[data-level="1"] { margin-left: 20px; }
            .node[data-level="2"] { margin-left: 40px; }
            .node[data-level="3"], .node[data-level="4"], .node[data-level="5"] { margin-left: 60px; }
            .toggle { width: 20px; height: 20px; }
            .controls { gap: 10px; }
            .btn { padding: 10px 18px; font-size: 0.9em; }
        }
        .footer { text-align: center; margin-top: 40px; color: #606078; font-size: 0.9em; }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <a href="clase-03.html" class="back-link">← Volver a Clase 03</a>
            <h1>Mind Map: Chatbot con Memoria</h1>
            <p class="subtitle">Cómo dar memoria a un LLM que no recuerda nada</p>
        </header>
        <div class="controls">
            <button class="btn btn-expand" onclick="expandAll()">📖 Expandir todo</button>
            <button class="btn btn-collapse" onclick="collapseAll()">📕 Colapsar todo</button>
        </div>
        <div class="mindmap">
            <div class="tree-view" id="mindmap"></div>
        </div>
        <div class="footer"><p>Haz clic en los nodos para expandir/colapsar.</p></div>
    </div>
    <script>
        const mindmapData = {
            title: "Chatbot con Memoria de Conversación",
            description: "Cómo dar memoria a un LLM que no recuerda nada",
            expanded: true,
            children: [
                {
                    title: "El Problema: LLMs sin memoria",
                    expanded: false,
                    children: [
                        {
                            title: "Cada llamada a la API es independiente (stateless)",
                            description: "Cada request es una hoja en blanco"
                        },
                        {
                            title: "No recuerda nada de conversaciones anteriores",
                            description: "Sin contexto → respuestas genéricas"
                        },
                        {
                            title: "Analogía: como HTTP sin cookies ni sesión",
                            description: "El servidor no sabe quién eres si no se lo dices cada vez"
                        }
                    ]
                },
                {
                    title: "La Solución: Array de messages",
                    expanded: false,
                    children: [
                        {
                            title: "conversation_history = [] — lista que crece",
                            description: "Estructura de datos clave: array de dicts con role y content"
                        },
                        {
                            title: "Flujo: user msg → enviar historial completo → recibir respuesta → guardar assistant msg → repetir",
                            description: "El LLM recibe TODO el contexto anterior en cada llamada"
                        },
                        {
                            title: "El system prompt siempre va primero",
                            description: "Define la personalidad y comportamiento del chatbot"
                        }
                    ]
                },
                {
                    title: "Context Window Overflow",
                    expanded: false,
                    children: [
                        {
                            title: "El historial crece sin límite",
                            description: "Cada mensaje nuevo se suma a los anteriores"
                        },
                        {
                            title: "Excede el context window → error de la API",
                            description: "GPT-4 tiene 8k/32k/128k tokens según modelo"
                        },
                        {
                            title: "Soluciones",
                            expanded: false,
                            children: [
                                {
                                    title: "Sliding window — mantener solo últimos N mensajes",
                                    description: "Borrar mensajes antiguos cuando se excede límite"
                                },
                                {
                                    title: "Resumir conversación — pedir al LLM que resuma lo anterior",
                                    description: "Condensar 20 mensajes en 1 resumen"
                                },
                                {
                                    title: "Truncar mensajes antiguos — borrar los más viejos",
                                    description: "Estrategia simple: FIFO (first in, first out)"
                                }
                            ]
                        }
                    ]
                },
                {
                    title: "Streaming (respuestas en tiempo real)",
                    expanded: false,
                    children: [
                        {
                            title: "stream=True en la llamada a la API",
                            description: "Parámetro que activa el streaming"
                        },
                        {
                            title: "Recibir chunks palabra a palabra",
                            description: "Iterar sobre chunks en lugar de esperar respuesta completa"
                        },
                        {
                            title: "UX tipo ChatGPT — respuesta aparece gradualmente",
                            description: "Mejor experiencia: no esperas bloqueado, ves texto aparecer"
                        }
                    ]
                },
                {
                    title: "Manejo de Errores",
                    expanded: false,
                    children: [
                        {
                            title: "Rate limits — demasiadas peticiones por minuto",
                            description: "Esperar y reintentar (exponential backoff)"
                        },
                        {
                            title: "API errors — red, auth, servidor",
                            description: "Capturar openai.APIError genérico"
                        },
                        {
                            title: "Timeouts — respuestas muy largas",
                            description: "Usar timeout en requests o async"
                        },
                        {
                            title: "try/except con openai.APIError, openai.RateLimitError",
                            description: "Importar desde openai library y capturar específicamente"
                        }
                    ]
                },
                {
                    title: "Arquitectura del Chatbot",
                    expanded: false,
                    children: [
                        {
                            title: "Loop principal: input → chat() → print",
                            description: "while True: user_input → procesar → mostrar respuesta"
                        },
                        {
                            title: "Función chat(): añade msg, llama API, guarda respuesta",
                            description: "Encapsula toda la lógica de memoria e interacción"
                        },
                        {
                            title: "Persistencia: guardar historial en JSON (opcional)",
                            description: "Recuperar conversación anterior al reiniciar"
                        }
                    ]
                }
            ]
        };

        function renderNode(data, parentElement, level = 0) {
            const nodeEl = document.createElement('div');
            nodeEl.className = 'node';
            nodeEl.setAttribute('data-level', level);

            const hasChildren = data.children && data.children.length > 0;
            const toggleEl = document.createElement('div');
            toggleEl.className = `toggle ${hasChildren ? (data.expanded ? 'expanded' : 'collapsed') : 'empty'}`;
            toggleEl.onclick = (e) => {
                e.stopPropagation();
                if (hasChildren) toggleNode(nodeEl, data);
            };

            const contentEl = document.createElement('div');
            contentEl.className = 'node-content';
            const titleEl = document.createElement('div');
            titleEl.className = 'node-title';
            titleEl.textContent = data.title;
            contentEl.appendChild(titleEl);

            if (data.description) {
                const descEl = document.createElement('div');
                descEl.className = 'node-description';
                descEl.textContent = data.description;
                contentEl.appendChild(descEl);
            }

            nodeEl.appendChild(toggleEl);
            nodeEl.appendChild(contentEl);

            if (hasChildren) {
                const childrenContainer = document.createElement('div');
                childrenContainer.className = `children ${!data.expanded ? 'collapsed' : ''}`;
                data.children.forEach(child => renderNode(child, childrenContainer, level + 1));
                nodeEl.appendChild(childrenContainer);
            }

            parentElement.appendChild(nodeEl);
        }

        function toggleNode(nodeEl, data) {
            const toggle = nodeEl.querySelector('.toggle');
            const childrenEl = nodeEl.querySelector('.children');

            if (data.expanded) {
                data.expanded = false;
                toggle.classList.remove('expanded');
                toggle.classList.add('collapsed');
                childrenEl.classList.add('collapsed');
            } else {
                data.expanded = true;
                toggle.classList.remove('collapsed');
                toggle.classList.add('expanded');
                childrenEl.classList.remove('collapsed');
            }
        }

        function expandAll() {
            expandAllRecursive(mindmapData);
            renderMindmap();
        }

        function collapseAll() {
            collapseAllRecursive(mindmapData);
            renderMindmap();
        }

        function expandAllRecursive(node) {
            node.expanded = true;
            if (node.children) {
                node.children.forEach(child => expandAllRecursive(child));
            }
        }

        function collapseAllRecursive(node) {
            if (node.children && node.children.length > 0) {
                node.expanded = false;
                node.children.forEach(child => collapseAllRecursive(child));
            }
        }

        function renderMindmap() {
            const container = document.getElementById('mindmap');
            container.innerHTML = '';
            renderNode(mindmapData, container);
        }

        document.addEventListener('DOMContentLoaded', () => {
            renderMindmap();
        });
    </script>
</body>
</html>
